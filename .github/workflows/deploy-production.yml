name: Deploy Production

on:
  push:
    branches: [main]

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  deploy-web:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.4"

      - run: bun install --frozen-lockfile

      - name: Build web
        env:
          VITE_API_URL: ${{ secrets.PRODUCTION_API_URL }}
        run: bunx turbo run build --filter=web

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to S3 + CloudFront
        run: |
          chmod +x infrastructure/scripts/deploy-frontend.sh
          ./infrastructure/scripts/deploy-frontend.sh \
            apps/web/dist \
            ${{ secrets.PRODUCTION_WEB_S3_BUCKET }} \
            ${{ secrets.PRODUCTION_WEB_CLOUDFRONT_ID }}

  deploy-admin:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.4"

      - run: bun install --frozen-lockfile

      - name: Build admin
        env:
          VITE_API_URL: ${{ secrets.PRODUCTION_API_URL }}
        run: bunx turbo run build --filter=admin

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to S3 + CloudFront
        run: |
          chmod +x infrastructure/scripts/deploy-frontend.sh
          ./infrastructure/scripts/deploy-frontend.sh \
            apps/admin/dist \
            ${{ secrets.PRODUCTION_ADMIN_S3_BUCKET }} \
            ${{ secrets.PRODUCTION_ADMIN_CLOUDFRONT_ID }}

  deploy-api:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.4"

      - run: bun install --frozen-lockfile

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Run migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}postgres
        run: |
          chmod +x infrastructure/scripts/migrate.sh
          ./infrastructure/scripts/migrate.sh

      - name: Build and deploy Lambda
        env:
          LAMBDA_ENV_VARS: '{"S3_BUCKET_ASSET":"${{ secrets.PRODUCTION_S3_BUCKET_ASSET }}","BACKUP_S3_BUCKET":"${{ secrets.PRODUCTION_BACKUP_S3_BUCKET }}","S3_REGION":"eu-west-3","FRONTEND_URL":"${{ secrets.FRONTEND_URL_PRD }}"}'
        run: |
          chmod +x infrastructure/scripts/deploy-api.sh
          ./infrastructure/scripts/deploy-api.sh ${{ secrets.PRODUCTION_API_LAMBDA_NAME }}
