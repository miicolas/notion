name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://test:test@localhost:5433/test
      BETTER_AUTH_SECRET: ci-test-secret
      BETTER_AUTH_URL: http://localhost:3001
      MIGRATE_PASSWORD: ci-test-password

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.4"

      - run: bun install --frozen-lockfile

      - run: bun run lint

      - run: bun run typecheck

      - name: Run API tests
        run: cd apps/api && bun run test
